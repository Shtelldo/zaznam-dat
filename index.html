<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Databázový manažér</title>
    <style>
        body {
            background-color: rgb(254, 237, 255);
            font-family: sans-serif;
            padding: 20px;
        }
        td.selected {
            background-color: rgb(176, 148, 170);
        }
        td.editable {
            background-color: #ffc0ec;
        }
        tr.row-selected td {
            background-color: #d0eaff;
        }
        #summary-table {
            margin-top: 20px;
        }
        .buttons-container {
            margin-bottom: 15px;
        }
        button {
            padding: 8px 15px;
            margin-right: 10px;
            cursor: pointer;
        }
        #status-message {
            margin: 10px 0;
            font-weight: bold;
            color: #555;
        }
    </style>
</head>
<body>

    <div class="buttons-container">
        <button onclick="refreshData()">refresh list</button>
        <button onclick="loadDatabase()">load database</button>
    </div>

    <div id="status-message"></div>
    
    <table id="main-table" width="1500" border="1">
        <thead>
            <tr>
                <th>uid</th>
                <th>name</th>
                <th>birth date</th>
                <th>hobbies</th>
                <th>country</th>
                <th>street</th>
                <th>city</th>
                <th>postal code</th>
                <th>action</th>
            </tr>
        </thead>
        <tbody id="main-table-body"></tbody>
    </table>

    <h3>Koníčky a počty</h3>
    <table id="summary-table" width="600" border="1">
        <thead>
            <tr>
                <th>hobby</th>
                <th>pocet</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <script>
        let selectedRow = null;
        // Vždy sa connectuj na Node.js server na localhost:3000 (bez ohľadu kde je HTML)
        const apiBase = 'http://localhost:3000';
        const statusMessage = document.getElementById('status-message');

        function showStatus(text) {
            statusMessage.textContent = text;
        }

        function clearStatus() {
            statusMessage.textContent = '';
        }

        function updateHobbySummary(data) {
            const hobbyCount = {};
            data.forEach(user => {
                // Bezpečné rozdelenie textového reťazca z MySQL na pole koníčkov
                const hobbies = typeof user.hobbies === 'string'
                    ? user.hobbies.split('|').map(h => h.trim()).filter(Boolean)
                    : Array.isArray(user.hobbies) ? user.hobbies : [];

                hobbies.forEach(hobby => {
                    hobbyCount[hobby] = (hobbyCount[hobby] || 0) + 1;
                });
            });

            const summaryBody = document.querySelector('#summary-table tbody');
            summaryBody.innerHTML = '';
            
            Object.entries(hobbyCount).sort().forEach(([hobby, count]) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${hobby}</td>
                    <td>${count}</td>
                `;
                summaryBody.appendChild(row);
            });
        }

        function addClickHandlers(row, user) {
            const cells = row.querySelectorAll('td:not(.action)');
            cells.forEach((cell, index) => {
                cell.addEventListener('click', function() {
                    this.classList.toggle('selected');
                });
                
                // Autosave keď užívateľ skončí editovať
                cell.addEventListener('blur', function() {
                    if (this.classList.contains('editable')) {
                        autoSaveCell(row, index);
                    }
                }, true);
            });

            row.addEventListener('click', function() {
                if (selectedRow) {
                    selectedRow.classList.remove('row-selected');
                }
                selectedRow = row;
                selectedRow.classList.add('row-selected');
            });
        }

        function autoSaveCell(row, cellIndex) {
            const cells = row.querySelectorAll('td');
            const userData = {
                uid: cells[0].textContent,
                name: cells[1].textContent,
                birth_date: cells[2].textContent,
                hobbies: cells[3].textContent,
                country: cells[4].textContent,
                street: cells[5].textContent,
                city: cells[6].textContent,
                postal_code: cells[7].textContent
            };

            fetch(`${apiBase}/update-user`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(userData)
            })
            .then(response => {
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return response.json();
            })
            .then(result => {
                if (result.status === 'success') {
                    console.log('✅ Bunka bola uložená');
                } else {
                    console.error('❌ Chyba:', result.message);
                }
            })
            .catch(error => {
                console.error('Error saving:', error);
                showStatus('❌ Chyba pri ukladaní: ' + error.message);
            });
        }

        function toggleEditRow(row) {
            const editButton = row.querySelector('.edit-button');
            const isEditing = editButton.textContent === 'edit';
            const cells = row.querySelectorAll('td:not(.action)');

            cells.forEach(cell => {
                cell.contentEditable = isEditing;
                cell.classList.toggle('editable', isEditing);
            });

            editButton.textContent = isEditing ? '✓ done' : 'edit';
            row.classList.toggle('editing', isEditing);
        }

        function saveRow(row) {
            const cells = row.querySelectorAll('td');
            const userData = {
                uid: cells[0].textContent,
                name: cells[1].textContent,
                birth_date: cells[2].textContent,
                hobbies: cells[3].textContent,
                country: cells[4].textContent,
                street: cells[5].textContent,
                city: cells[6].textContent,
                postal_code: cells[7].textContent
            };

            console.log("📤 Posielam na server:", userData);
            
            fetch(`${apiBase}/update-user`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(userData)
            })
            .then(response => {
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return response.json();
            })
            .then(result => {
                if (result.status === 'success') {
                    showStatus('✅ Dáta boli uložené!');
                    toggleEditRow(row);
                    setTimeout(clearStatus, 2000);
                } else {
                    showStatus('❌ Chyba: ' + result.message);
                }
            })
            .catch(error => {
                console.error('Error:', error);
                showStatus('❌ Chyba pri ukladaní: ' + error.message);
            });
        }

        function loadData(data) {
            const tableBody = document.getElementById('main-table-body');
            tableBody.innerHTML = ''; // Vyčistenie starých riadkov

            if (!Array.isArray(data) || data.length === 0) {
                showStatus('Nenašli sa žiadne dáta v databáze. Skús najprv kliknúť na "load database".');
                updateHobbySummary([]);
                return;
            }
            clearStatus();

            data.forEach((user, index) => {
                // Spracovanie koníčkov z MySQL štruktúry
                const hobbiesString = typeof user.hobbies === 'string' ? user.hobbies : '';
                
                // Funkcia na bezpečné escapeovanie HTML znakov
                const escapeHtml = (text) => {
                    const div = document.createElement('div');
                    div.textContent = text;
                    return div.innerHTML;
                };

                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${escapeHtml(String(user.uid || ''))}</td>
                    <td>${escapeHtml(String(user.name || ''))}</td>
                    <td>${escapeHtml(String(user.birth_date || ''))}</td>
                    <td>${escapeHtml(hobbiesString)}</td>
                    <td>${escapeHtml(String(user.country || ''))}</td>
                    <td>${escapeHtml(String(user.street || user.address?.street || ''))}</td>
                    <td>${escapeHtml(String(user.city || user.address?.city || ''))}</td>
                    <td>${escapeHtml(String(user.postal_code || user.address?.postal_code || ''))}</td>
                    <td class="action"><button type="button" class="edit-button">edit</button></td>
                `;
                
                addClickHandlers(row, user);
                
                // Jednoduchý button - iba toggle edit modu
                row.querySelector('.edit-button').addEventListener('click', function(e) {
                    e.stopPropagation();
                    toggleEditRow(row);
                });
                
                tableBody.appendChild(row);

                if (index === 0) {
                    selectedRow = row;
                    selectedRow.classList.add('row-selected');
                }
            });
            updateHobbySummary(data);
        }

        // Načítanie dát z lokálnej MySQL databázy cez Node.js server
        function refreshData() {
            const tableBody = document.getElementById('main-table-body');
            selectedRow = null;
            if (tableBody) tableBody.innerHTML = '';
            
            showStatus('Načítavam zoznam z MySQL...');
            
            fetch(`${apiBase}/get-users`)
                .then(response => {
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    return response.json();
                })
                .then(data => loadData(data))
                .catch(error => {
                    console.error('Error fetching users:', error);
                    showStatus('❌ Chyba: ' + error.message + '. Beží node server na localhost:3000?');
                });
        }

        // Funkcia pre tlačidlo "load database" – povie serveru, aby stiahol API a uložil do MySQL
        function loadDatabase() {
            showStatus('Server sťahuje čerstvé dáta z API do MySQL...');
            fetch(`${apiBase}/update-database`)
                .then(response => {
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    return response.json();
                })
                .then(result => {
                    if (result.status === 'success') {
                        showStatus('Dáta boli úspešne zapísané do MySQL. Aktualizujem tabuľku...');
                        refreshData();
                    } else {
                        showStatus('Server zahlásil chybu: ' + (result.message || 'Neznáma chyba'));
                    }
                })
                .catch(error => {
                    console.error('Error updating database:', error);
                    showStatus('❌ Chyba: ' + error.message + '. Beží node server na localhost:3000?');
                });
        }

        // Automatické načítanie dát hneď po zapnutí stránky
        window.addEventListener('DOMContentLoaded', refreshData);
    </script>
</body>
</html>
